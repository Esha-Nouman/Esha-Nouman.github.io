<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esha | Education</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-color: #f4f4f9; /* A clean, simple background instead of the moving colors */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Styles your 6-point list nicely */
        ol {
            line-height: 1.8;
            font-size: 1.2rem;
            color: #555;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #e73c7e;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <h1>My Education</h1>
        
        <ol>
            <li>First educational milestone or school</li>
            <li>Second milestone</li>
            <li>Third milestone</li>
            <li>Fourth milestone</li>
            <li>Fifth milestone</li>
            <li>Sixth milestone</li>
        </ol>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
