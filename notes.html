<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esha | Notes</title>
    <style>
        /* --- 1. ANIMATED GRADIENT BACKGROUND --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. NOTES CARD --- */
        .notes-card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 20px;
            line-height: 1.6;
        }

        .status-tag {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- 3. BACK BUTTON --- */
        .back-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid white;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: white;
            color: #e73c7e;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="notes-card">
        <h1>My Notes</h1>
        <div class="status-tag">System Initializing</div>
        <p>I am currently building a digital archive for my personal notes. Soon, this space will feature a structured index with folders and subfolders for easy navigation.</p>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
